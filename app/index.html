<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punto Club</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Empresa piloto</p>
          <h1>Punto Club</h1>
        </div>
        <div class="status-pill" id="data-source-status">Mock local</div>
      </header>

      <main class="workspace" aria-live="polite">
        <aside class="panel-nav" aria-label="Flujo de caja">
          <button class="panel-nav-button" type="button" data-panel-target="customer" aria-pressed="true">
            Registrar cliente
          </button>
          <button class="panel-nav-button" type="button" data-panel-target="purchase" aria-pressed="false">
            Registrar compra
          </button>
          <button class="panel-nav-button" type="button" data-panel-target="redemption" aria-pressed="false">
            Redimir puntos
          </button>
        </aside>

        <div class="panel-stack">
          <section class="form-panel operation-panel" data-panel="customer" aria-labelledby="new-customer-title">
            <div class="section-header">
              <div>
                <p class="eyebrow">Registro</p>
                <h2 id="new-customer-title">Nuevo cliente</h2>
              </div>
            </div>

            <div id="success-message" class="success-message" hidden></div>

            <form id="new-customer-form" class="customer-form" novalidate>
              <div class="field">
                <label for="customer-name">Nombre</label>
                <input id="customer-name" name="name" maxlength="160" autocomplete="name" />
                <p class="field-error" id="customer-name-error"></p>
              </div>

              <div class="field">
                <label for="customer-phone">Telefono</label>
                <input id="customer-phone" name="phone" maxlength="32" autocomplete="tel" />
                <p class="field-error" id="customer-phone-error"></p>
              </div>

              <div class="field">
                <label for="customer-email">Email</label>
                <input id="customer-email" name="email" maxlength="254" autocomplete="email" />
                <p class="field-error" id="customer-email-error"></p>
              </div>

              <div id="form-error" class="form-error" hidden></div>

              <div class="form-actions">
                <button class="secondary-button" id="reset-form-button" type="button">Vaciar</button>
                <button id="save-customer-button" type="submit">Registrar cliente</button>
              </div>
            </form>
          </section>

          <section class="purchase-panel operation-panel" data-panel="purchase" aria-labelledby="purchase-title" hidden>
            <div class="section-header">
              <div>
                <p class="eyebrow">Compra</p>
                <h2 id="purchase-title">Registrar compra</h2>
              </div>
            </div>

            <div id="selected-customer-card" class="selected-customer-card">
              Seleccione un cliente para registrar compra.
            </div>

            <div id="purchase-success-message" class="success-message" hidden></div>

            <form id="purchase-form" class="purchase-form" hidden novalidate>
              <div class="field">
                <label for="purchase-invoice-number">Factura o comprobante</label>
                <input id="purchase-invoice-number" name="invoiceNumber" maxlength="80" autocomplete="off" />
                <p class="field-error" id="purchase-invoice-number-error"></p>
              </div>

              <div class="field-grid">
                <div class="field">
                  <label for="purchase-date">Fecha</label>
                  <input id="purchase-date" name="purchaseDate" type="date" />
                  <p class="field-error" id="purchase-date-error"></p>
                </div>

                <div class="field">
                  <label for="purchase-amount">Monto</label>
                  <input id="purchase-amount" name="amount" type="number" min="0.01" step="0.01" inputmode="decimal" />
                  <p class="field-error" id="purchase-amount-error"></p>
                </div>
              </div>

              <div id="purchase-error" class="form-error" hidden></div>

              <div class="form-actions">
                <button class="secondary-button" id="reset-purchase-button" type="button">Vaciar compra</button>
                <button class="secondary-button" id="go-redemption-button" type="button">Ir a redimir puntos</button>
                <button id="save-purchase-button" type="submit">Registrar compra</button>
              </div>
            </form>
          </section>

          <section class="redemption-panel operation-panel" data-panel="redemption" aria-labelledby="redemption-title" hidden>
            <div class="section-header">
              <div>
                <p class="eyebrow">Canje</p>
                <h2 id="redemption-title">Redimir puntos</h2>
              </div>
            </div>

            <div id="redemption-customer-card" class="selected-customer-card">
              Seleccione un cliente para redimir puntos.
            </div>

            <div id="redemption-success-message" class="success-message" hidden></div>

            <form id="redemption-form" class="redemption-form" hidden novalidate>
              <div class="field-grid">
                <div class="field">
                  <label for="redemption-date">Fecha</label>
                  <input id="redemption-date" name="redemptionDate" type="date" />
                  <p class="field-error" id="redemption-date-error"></p>
                </div>

                <div class="field">
                  <label for="redemption-points">Puntos a redimir</label>
                  <input id="redemption-points" name="pointsRedeemed" type="number" min="1" step="1" inputmode="numeric" />
                  <p class="field-error" id="redemption-points-error"></p>
                </div>
              </div>

              <div class="field">
                <label for="redemption-note">Nota opcional</label>
                <textarea id="redemption-note" name="note" maxlength="500" rows="3"></textarea>
                <p class="field-error" id="redemption-note-error"></p>
              </div>

              <div id="redemption-error" class="form-error" hidden></div>

              <div class="form-actions">
                <button class="secondary-button" id="reset-redemption-button" type="button">Vaciar canje</button>
                <button id="save-redemption-button" type="submit">Redimir puntos</button>
              </div>
            </form>
          </section>
        </div>

        <section class="customers-panel" aria-labelledby="customers-title">
          <div class="section-header">
            <div>
              <p class="eyebrow">Clientes</p>
              <h2 id="customers-title">Buscar cliente</h2>
            </div>
            <button class="secondary-button" id="clear-search-button" type="button">Limpiar</button>
          </div>

          <form class="search-form" id="customer-search-form">
            <label for="customer-search">Telefono, nombre o email</label>
            <div class="search-row">
              <input
                id="customer-search"
                name="search"
                type="search"
                autocomplete="off"
                placeholder="Ej. 8888, Maria, cliente@correo.com"
              />
              <button type="submit">Buscar</button>
            </div>
          </form>

          <div id="customers-feedback" class="feedback" hidden></div>
          <div id="customers-list" class="customers-list"></div>
        </section>
      </main>
    </div>

    <script src="./app-config.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
